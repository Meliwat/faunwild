<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FAUNWILD - an original Kin adventure</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#0c0c14;color:#aeb4c8;font-family:ui-monospace,Menlo,Consolas,monospace;overflow:hidden;
 -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
#wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px}
#cv{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;border:3px solid #23233a;border-radius:6px;
 box-shadow:0 0 0 1px #000,0 14px 50px rgba(0,0,0,.6)}
#hint{font-size:11px;letter-spacing:.08em;color:#5b6178}
#pads{display:none;width:100%;max-width:480px;justify-content:space-between;align-items:center;
 padding:4px 16px 18px;box-sizing:border-box;touch-action:none}
.dpad{display:grid;grid-template-columns:repeat(3,48px);grid-template-rows:repeat(3,48px)}
.pbtn{background:#1d1d30;border:2px solid #3c3c5e;border-radius:10px;color:#9aa1bd;font:inherit;font-size:17px;
 display:flex;align-items:center;justify-content:center;margin:1px;padding:0}
.pbtn.on{background:#3a3a60;color:#e8eaf4}
.ab{width:56px;height:56px;border-radius:50%;font-size:19px;font-weight:bold}
.abwrap{display:flex;gap:12px;align-items:flex-end}
.ab[data-k=b]{margin-top:26px}
.start{width:62px;height:28px;border-radius:14px;font-size:10px;letter-spacing:.1em}
@media (hover:none) and (pointer:coarse){#pads{display:flex}#hint{display:none}}
#io{display:none;position:fixed;inset:0;background:rgba(5,5,12,.88);z-index:9;
 align-items:center;justify-content:center;flex-direction:column;gap:10px;padding:16px;box-sizing:border-box}
#io .box{background:#15152a;border:2px solid #3c3c5e;border-radius:10px;padding:14px;width:min(560px,94vw);
 display:flex;flex-direction:column;gap:10px}
#iotitle{font-size:13px;color:#e6c95e;letter-spacing:.06em}
#iotext{width:100%;height:120px;background:#0a0a16;color:#9fe6b8;border:1px solid #34345a;border-radius:6px;
 font:11px/1.5 ui-monospace,monospace;padding:8px;box-sizing:border-box;word-break:break-all;resize:none}
#io button{background:#2a2a48;border:2px solid #4a4a76;color:#dfe2f0;font:inherit;font-size:12px;
 padding:7px 16px;border-radius:8px;cursor:pointer}
#io .row{display:flex;gap:10px;justify-content:flex-end}
</style>
</head>
<body>
<div id="wrap">
 <canvas id="cv" width="160" height="144"></canvas>
 <div id="hint">MOVE: ARROWS / WASD &nbsp;&middot;&nbsp; A: Z &nbsp;&middot;&nbsp; B: X &nbsp;&middot;&nbsp; START: ENTER</div>
 <div id="pads">
  <div class="dpad">
   <div></div><button class="pbtn" data-k="u">&#9650;</button><div></div>
   <button class="pbtn" data-k="l">&#9664;</button><div></div><button class="pbtn" data-k="r">&#9654;</button>
   <div></div><button class="pbtn" data-k="d">&#9660;</button><div></div>
  </div>
  <button class="pbtn start" data-k="st">START</button>
  <div class="abwrap">
   <button class="pbtn ab" data-k="b">B</button>
   <button class="pbtn ab" data-k="a">A</button>
  </div>
 </div>
</div>
<div id="io">
 <div class="box">
  <div id="iotitle">SAVE CODE</div>
  <textarea id="iotext" spellcheck="false"></textarea>
  <div class="row"><button id="ioload">LOAD</button><button id="ioclose">CLOSE</button></div>
 </div>
</div>
<script>
/*__GAME_JS__*/
</script>
</body>
</html>
